<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rachel Walsgrove</title>
  <meta name="description" content="Rachel Walsgrove — bartender, Boston. Exclusive content on Fanvue." />
  <!-- Prevent search engine indexing -->
  <meta name="robots" content="noindex, nofollow" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e0e0e;
      --surface:  #181818;
      --border:   #2a2a2a;
      --text:     #f0f0f0;
      --muted:    #888;
      --accent:   #c9a96e;   /* warm gold — bar/whiskey aesthetic */
      --btn-bg:   #c9a96e;
      --btn-text: #0e0e0e;
      --radius:   12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 20px 80px;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Avatar */
    .avatar-ring {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--accent) 0%, #8b5e2d 100%);
    }
    .avatar-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: var(--surface);
    }
    .avatar-initials {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -1px;
    }

    /* Name + handle */
    .identity {
      text-align: center;
    }
    .identity h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }
    .identity .handle {
      font-size: 14px;
      color: var(--muted);
    }

    /* Bio */
    .bio {
      text-align: center;
      font-size: 15px;
      line-height: 1.55;
      color: #ccc;
      max-width: 340px;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
    }

    /* CTA button */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 340px;
      padding: 16px 24px;
      background: var(--btn-bg);
      color: var(--btn-text);
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.2px;
      transition: opacity 0.15s ease, transform 0.1s ease;
    }
    .btn-primary:hover  { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary svg {
      flex-shrink: 0;
    }

    /* Social row */
    .social-row {
      display: flex;
      gap: 16px;
    }
    .social-link {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .social-link:hover { border-color: var(--accent); color: var(--accent); }

  </style>
</head>
<body>
  <div class="card">

    <!-- Avatar (initials fallback; swap src for a real SFW photo later) -->
    <div class="avatar-ring">
      <!-- To add a real photo: replace the div below with <img src="avatar.jpg" alt="Rachel"> -->
      <div class="avatar-initials">RW</div>
    </div>

    <!-- Name -->
    <div class="identity">
      <h1>Rachel Walsgrove</h1>
      <span class="handle">@rachelwalsgrove</span>
    </div>

    <!-- Bio -->
    <p class="bio">
      Bartender. Boston. Late nights &amp; honest pours.<br>
      Exclusive content for subscribers.
    </p>

    <div class="divider"></div>

    <!-- Fanvue CTA -->
    <a
      href="https://fanvue.com/rachel.walsgrove"
      target="_blank"
      rel="noopener noreferrer"
      class="btn-primary"
    >
      <!-- Lock icon -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Subscribe on Fanvue
    </a>

    <!-- Social links -->
    <div class="social-row">
      <!-- Instagram — update href to Rachel's IG profile URL -->
      <a href="https://www.instagram.com/rachelwalsgrove" target="_blank" rel="noopener" class="social-link" aria-label="Instagram">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </a>
      <!-- TikTok — update href to Rachel's TikTok profile URL -->
      <a href="https://www.tiktok.com/@rachelwalsgrove" target="_blank" rel="noopener" class="social-link" aria-label="TikTok">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.2 8.2 0 0 0 4.79 1.53V6.78a4.85 4.85 0 0 1-1.02-.09z"/>
        </svg>
      </a>
    </div>

  </div>
</body>
</html>
